<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Alertas Meteorológicos</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #1f7a1f; 
            color: white;
            text-align: center;
            transition: background-color 0.5s ease;
        }

        .navbar {
            max-width: 550px;
            margin: 0 auto 15px auto;
            display: flex;
            justify-content: flex-end;
        }

        .navbar a {
            color: #ffffff;
            text-decoration: none;
            background: #2b2b2b;
            padding: 8px 16px;
            border-radius: 12px;
            border: 2px solid #ffffff;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .navbar a:hover {
            background-color: #444444;
        }

        .painel-container {
            max-width: 550px;
            margin: 0 auto;
        }

        h1 {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .info-linha {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .caixa {
            background-color: #2b2b2b;
            border: 2px solid white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            text-align: left;
        }

        .caixa-titulo {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .caixa-conteudo {
            font-size: 15px;
            color: #e0e0e0;
            white-space: pre-wrap;
        }

        .texto-mensagem {
            font-size: 14px;
            color: #d0d0d0;
            margin-top: 5px;
        }

        .caixa-anuncio {
            background-color: #2b2b2b;
            border: 2px solid white;
            border-radius: 12px;
            margin-bottom: 12px;
            height: 140px;
            overflow: hidden;
            position: relative;
        }

        .caixa-anuncio iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .rodape {
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body id="corpo-site">

    <div class="painel-container">
        <div class="navbar">
            <a href="download.html">📥 Baixar Aplicativo</a>
        </div>

        <h1>CENTRAL DE ALERTAS METEOROLÓGICOS</h1>
         
        <div class="info-linha" id="web-cidade">📍 Localização: Detectando...</div>
        <div class="info-linha">🟢 Sistema ONLINE</div>
        <div class="info-linha" id="web-relogio">🕒 --/--/----, --:--:--</div>

        <div class="caixa">
            <div class="caixa-titulo">⚠️ ALERTAS</div>
            <div class="caixa-conteudo" id="alerta-texto">Nenhum alerta ativo.</div>
            <div class="texto-mensagem" id="alerta-mensagem"></div>
        </div>

        <div class="caixa">
            <div class="caixa-titulo">🚨 ALERTAS GRAVES</div>
            <div class="caixa-conteudo" id="grave-texto">Nenhum alerta grave.</div>
        </div>

        <div class="caixa-anuncio">
            <iframe src="anuncios.html" title="Espaço Publicitário"></iframe>
        </div>

        <div class="caixa">
            <div class="caixa-titulo">📜 HISTÓRICO RECENTE</div>
            <div class="caixa-conteudo" id="historico-texto">Nenhum registro anterior.</div>
        </div>

        <div class="rodape">Fonte: INMET / GFS</div>
        <div class="rodape" id="web-checagem">Última checagem: Conectando...</div>
    </div>

    <script>
        const URL_FIREBASE = "https://central-de-alertas-26-default-rtdb.firebaseio.com/.json";
         
        let estadoAtual = -1;
        let historicoAlertas = [];

        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('web-relogio').innerText = "🕒 " + agora.toLocaleString('pt-BR');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        function detectarLocalizacao() {
            fetch("http://ip-api.com/json/?fields=status,city,region")
                .then(res => res.json())
                .then(dados => {
                    if (dados.status === "success") {
                        document.getElementById('web-cidade').innerText = `📍 ${dados.city} - ${dados.region}`;
                    } else {
                        document.getElementById('web-cidade').innerText = "📍 Curitiba - PR";
                    }
                })
                .catch(() => {
                    document.getElementById('web-cidade').innerText = "📍 Curitiba - PR";
                });
        }
        detectarLocalizacao();
// ==========================================
// CONEXÃO EM TEMPO REAL COM A NUVEM (FIREBASE)
// ==========================================
function escutarNuvemFirebase() {
    const URL_FIREBASE = "https://central-de-alertas-26-default-rtdb.firebaseio.com/.json";

    function puxarDados() {
        fetch(URL_FIREBASE)
            .then(res => {
                if (!res.ok) throw new Error("Erro na rede");
                return res.json();
            })
            .then(dados => {
                if (!dados) return;

                // 1. Atualiza o indicador de checagem no rodapé do site
                const lblChecagem = document.getElementById('web-checagem');
                if (lblChecagem) {
                    lblChecagem.innerText = `Última checagem: Conectado (${new Date().toLocaleTimeString('pt-BR')})`;
                }

                // 2. Extrai os dados enviados pelo seu main.py
                let alerta = dados.alerta_atual || dados;
                
                if (alerta && alerta.estado !== undefined) {
                    const estadoNuvem = parseInt(alerta.estado);
                    const mensagemNuvem = alerta.mensagem || "";
                    const horarioAlerta = alerta.horario || alerta.horario_atualizacao || "--:--:--";

                    // Se a nuvem tiver um estado diferente do que está na tela, atualiza!
                    if (typeof estadoAtual !== 'undefined' && estadoNuvem !== estadoAtual) {
                        processarMudancaEstado(estadoNuvem, mensagemNuvem, horarioAlerta);
                    } else if (typeof estadoAtual === 'undefined') {
                        // Caso a variável global tenha outro nome, executa direto
                        processarMudancaEstado(estadoNuvem, mensagemNuvem, horarioAlerta);
                    }
                }
            })
            .catch(erro => {
                console.error("Erro ao conectar com a nuvem Firebase:", erro);
                const lblChecagem = document.getElementById('web-checagem');
                if (lblChecagem) {
                    lblChecagem.innerText = "Última checagem: Erro de conexão com a nuvem";
                }
            });
    }

    // Monitora a nuvem a cada 3 segundos
    setInterval(puxarDados, 3000);
    puxarDados(); // Executa a primeira vez de imediato
}

// Ativa a busca assim que a página carregar no PC
window.addEventListener('DOMContentLoaded', () => {
    escutarNuvemFirebase();
});
        function adicionarAoHistorico(nomeAlerta, hora) {
            if (!hora || hora === "--:--:--") return;
            const registro = `🕒 ${hora} - ${nomeAlerta}`;
             
            if (historicoAlertas.length > 0 && historicoAlertas[0] === registro) return;

            historicoAlertas.unshift(registro);
            if (historicoAlertas.length > 3) historicoAlertas.pop();

            document.getElementById('historico-texto').innerText = historicoAlertas.join('\n');
        }

        function processarMudancaEstado(novoEstado, msgTexto, horarioAlerta) {
            estadoAtual = novoEstado;
            const bgBody = document.getElementById('corpo-site');
            const lblAlerta = document.getElementById('alerta-texto');
            const lblMensagem = document.getElementById('alerta-mensagem');
            const lblGrave = document.getElementById('grave-texto');

            if (novoEstado === 0) {
                bgBody.style.backgroundColor = "#1f7a1f";
                lblAlerta.innerText = "Nenhum alerta ativo.";
                lblMensagem.innerText = "";
                lblGrave.innerText = "Nenhum alerta grave.";
                adicionarAoHistorico("🟢 Sistema Limpo / Sem Alertas", horarioAlerta);

            } else if (novoEstado === 1) {
                bgBody.style.backgroundColor = "#d4b000";
                lblAlerta.innerText = "Central Amarelo (Perigo Potencial)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "Nenhum alerta grave.";
                adicionarAoHistorico("🟡 Central: Alerta Amarelo", horarioAlerta);

            } else if (novoEstado === 2) {
                bgBody.style.backgroundColor = "#d46a00";
                lblAlerta.innerText = "Central Laranja (Perigo)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "Nenhum alerta grave.";
                adicionarAoHistorico("🟠 Central: Alerta Laranja", horarioAlerta);

            } else if (novoEstado === 3) {
                bgBody.style.backgroundColor = "#b00000";
                lblAlerta.innerText = "Central Vermelho (Grande Perigo)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "🚨 ALERTA GRAVE";
                adicionarAoHistorico("🔴 Central: Alerta Vermelho", horarioAlerta);

            } else if (novoEstado === 4) {
                bgBody.style.backgroundColor = "#5e2ca5";
                lblAlerta.innerText = "Central Roxo Severo (Cell Broadcast)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "🚨 ALERTA GRAVE";
                adicionarAoHistorico("🟣 GFS: Cell Broadcast Severo", horarioAlerta);

            } else if (novoEstado === 5) {
                bgBody.style.backgroundColor = "#4b0082";
                lblAlerta.innerText = "Central Roxo Extremo (Cell Broadcast)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "🚨 ALERTA GRAVE";
                adicionarAoHistorico("🟣 GFS: Cell Broadcast Extremo", horarioAlerta);
            }
        }

        // ==========================================
        // CAPTURA DE ALERTAS INMET (Unificado e Corrigido)
        // ==========================================
        async function buscarAlertasINMET() {
            let blocoAlertas = document.getElementById('alerta-texto');
            let blocoGraves = document.getElementById('grave-texto');
            let elementoAtualizacao = document.getElementById('web-checagem');
            
            let estadoSigla = "PR"; 
            let cidadeUsuario = "Curitiba";

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);
                const respostaIp = await fetch('https://ipwho.is/', { signal: controller.signal });
                clearTimeout(timeoutId);

                if (respostaIp.ok) {
                    const dadosIp = await respostaIp.json();
                    if (dadosIp.success) {
                        estadoSigla = (dadosIp.region_code || "PR").toUpperCase();
                        cidadeUsuario = dadosIp.city || "Curitiba";
                    }
                }
            } catch (e) { 
                console.log("Usando localização padrão ou obtida anteriormente."); 
            }

            const urlInmet = 'https://apiprevmet3.inmet.gov.br/aviso/ativo';
            const listaProxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(urlInmet)}&cb=${Math.random()}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(urlInmet)}`
            ];

            let dadosInmet = null;

            for (let urlAtual of listaProxies) {
                try {
                    const resposta = await fetch(urlAtual);
                    if (!resposta.ok) continue;

                    const textoBruto = await resposta.text();
                    if (!textoBruto.trim().startsWith('{') && !textoBruto.trim().startsWith('[')) continue;

                    const objetoJson = JSON.parse(textoBruto);
                    dadosInmet = objetoJson.contents ? JSON.parse(objetoJson.contents) : objetoJson;
                    if (dadosInmet) break; 
                } catch (err) {
                    console.log("Tentando rota secundária...");
                }
            }

            if (!dadosInmet) {
                if (blocoAlertas) {
                    blocoAlertas.innerHTML = `<span style="color: #ffaa00;">Avisos INMET indisponíveis para ${cidadeUsuario}.</span>`;
                }
                return;
            }

            const agora = new Date();
            if (elementoAtualizacao) {
                elementoAtualizacao.innerText = `Última checagem: ${agora.toLocaleDateString('pt-BR')} às ${agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
            }

            try {
                let comunsAtuais = ""; let comunsAntecipados = "";
                let gravesAtuais = ""; let gravesAntecipados = "";
                let listaAlertas = [];

                if (Array.isArray(dadosInmet)) {
                    listaAlertas = dadosInmet;
                } else if (dadosInmet && typeof dadosInmet === 'object') {
                    Object.keys(dadosInmet).forEach(chave => {
                        const item = dadosInmet[chave];
                        if (Array.isArray(item)) listaAlertas.push(...item);
                        else listaAlertas.push(item);
                    });
                }

                listaAlertas.forEach(aviso => {
                    if (!aviso || !aviso.estados) return;

                    const estadosAviso = String(aviso.estados).toUpperCase();
                    if (estadosAviso.includes(estadoSigla)) {
                        const severidade = aviso.severidade || ""; 
                        const evento = aviso.evento || "Alerta Meteorológico";         
                        const risks = aviso.riscos || "Atenção às condições climáticas.";
                        const horaInicioTexto = aviso.inicio || "";

                        const formatoAlerta = `
                            <div style="margin-bottom: 10px; border-left: 3px solid #ffcc00; padding-left: 8px; text-align: left;">
                                <strong style="color: #ffcc00;">⚠️ ${evento}</strong><br>
                                <span style="font-size: 0.85em; color: #e0e0e0;">${risks}</span>
                            </div>
                        `;
                        
                        let dataInicio = new Date();
                        if (horaInicioTexto) dataInicio = new Date(horaInicioTexto.replace(/-/g, '/'));

                        const ehFuturo = dataInicio > agora;
                        const severidadeLower = severidade.toLowerCase();
                        const ehGrave = severidadeLower.includes('grande perigo') || 
                                       (severidadeLower.includes('perigo') && !severidadeLower.includes('potencial'));

                        if (ehGrave) {
                            if (ehFuturo) gravesAntecipados += formatoAlerta; else gravesAtuais += formatoAlerta;
                        } else {
                            if (ehFuturo) comunsAntecipados += formatoAlerta; else comunsAtuais += formatoAlerta;
                        }
                    }
                });

                if (blocoAlertas) {
                    blocoAlertas.innerHTML = (comunsAtuais ? `<strong>⚡ ATIVOS:</strong><br>${comunsAtuais}` : "") + 
                                             (comunsAntecipados ? `<br><strong>📅 PRÓXIMOS DIAS:</strong><br>${comunsAntecipados}` : "") || "Nenhum alerta ativo.";
                }

                if (blocoGraves) {
                    blocoGraves.innerHTML = (gravesAtuais ? `🚨 <strong>PERIGO:</strong><br>${gravesAtuais}` : "") + 
                                            (gravesAntecipados ? `<br><strong>📅 FUTURO:</strong><br>${gravesAntecipados}` : "") || "Nenhum alerta grave ativo.";
                }

            } catch (erro) {
                console.error('Erro de renderização do INMET:', erro);
            }
        }

        // Evento único de inicialização limpa
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                try { buscarAlertasINMET(); } catch(e) { console.error("Erro inicialização INMET:", e); }
            }, 150);
        });
    </script>
</body>
</html>
