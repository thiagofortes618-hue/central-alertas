<head>
    <meta charset="UTF-8">

    <style>

            color: white;

        .caixa-anuncio {

            width: 100%;
            height: 100%;
            border: none;

        }

            font-size: 14px;
            margin-top: 15px;
        }

</head>
<body id="corpo-site">

    <div class="painel-container">
        <div class="navbar">
            <a href="download.html">📥 Baixar Aplicativo</a>
        </div>

        <h1>CENTRAL DE ALERTAS METEOROLÓGICOS</h1>
        
        <div class="info-linha" id="web-cidade">📍 Localização: Detectando...</div>
        <div class="info-linha">🟢 Sistema ONLINE</div>
        <div class="info-linha" id="web-relogio">🕒 --/--/----, --:--:--</div>

        <div class="caixa">
            <div class="caixa-titulo">⚠️ ALERTAS</div>
            <div class="caixa-conteudo" id="alerta-texto">Nenhum alerta ativo.</div>
            <div class="texto-mensagem" id="alerta-mensagem"></div>
        </div>

        <div class="caixa">
            <div class="caixa-titulo">🚨 ALERTAS GRAVES</div>
            <div class="caixa-conteudo" id="grave-texto">Nenhum alerta grave.</div>
        </div>

        <div class="caixa-anuncio">
            <iframe src="anuncios.html" title="Espaço Publicitário"></iframe>
        </div>

        <div class="caixa">
            <div class="caixa-titulo">📜 HISTÓRICO RECENTE</div>
            <div class="caixa-conteudo" id="historico-texto">Nenhum registro anterior.</div>
        </div>

        <div class="rodape">Fonte: INMET / GFS</div>
        <div class="rodape" id="web-checagem">Última checagem: Conectando...</div>
    </div>

    <script>
        const URL_FIREBASE = "https://central-de-alertas-26-default-rtdb.firebaseio.com/.json";
        
        let estadoAtual = -1;
        let historicoAlertas = [];

        function atualizarRelogio() {
            const agora = new Date();
            document.getElementById('web-relogio').innerText = "🕒 " + agora.toLocaleString('pt-BR');
        }
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();

        function detectarLocalizacao() {
            fetch("http://ip-api.com/json/?fields=status,city,region")
                .then(res => res.json())
                .then(dados => {
                    if (dados.status === "success") {
                        document.getElementById('web-cidade').innerText = `📍 ${dados.city} - ${dados.region}`;
                    } else {
                        document.getElementById('web-cidade').innerText = "📍 Curitiba - PR";
                    }
                })
                .catch(() => {
                    document.getElementById('web-cidade').innerText = "📍 Curitiba - PR";
                });
        }
        detectarLocalizacao();

        function adicionarAoHistorico(nomeAlerta, hora) {
            if (!hora || hora === "--:--:--") return;
            const registro = `🕒 ${hora} - ${nomeAlerta}`;
            
            if (historicoAlertas.length > 0 && historicoAlertas[0] === registro) return;

            historicoAlertas.unshift(registro);
            if (historicoAlertas.length > 3) historicoAlertas.pop();

            document.getElementById('historico-texto').innerText = historicoAlertas.join('\n');
        }

        function processarMudancaEstado(novoEstado, msgTexto, horarioAlerta) {
            estadoAtual = novoEstado;
            const bgBody = document.getElementById('corpo-site');
            const lblAlerta = document.getElementById('alerta-texto');
            const lblMensagem = document.getElementById('alerta-mensagem');
            const lblGrave = document.getElementById('grave-texto');

            if (novoEstado === 0) {
                bgBody.style.backgroundColor = "#1f7a1f";
                lblAlerta.innerText = "Nenhum alerta ativo.";
                lblMensagem.innerText = "";
                lblGrave.innerText = "Nenhum alerta grave.";
                adicionarAoHistorico("🟢 Sistema Limpo / Sem Alertas", horarioAlerta);

            } else if (novoEstado === 1) {
                bgBody.style.backgroundColor = "#d4b000";
                lblAlerta.innerText = "Central Amarelo (Perigo Potencial)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "Nenhum alerta grave.";
                adicionarAoHistorico("🟡 Central: Alerta Amarelo", horarioAlerta);

            } else if (novoEstado === 2) {
                bgBody.style.backgroundColor = "#d46a00";
                lblAlerta.innerText = "Central Laranja (Perigo)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "Nenhum alerta grave.";
                adicionarAoHistorico("🟠 Central: Alerta Laranja", horarioAlerta);

            } else if (novoEstado === 3) {
                bgBody.style.backgroundColor = "#b00000";
                lblAlerta.innerText = "Central Vermelho (Grande Perigo)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "🚨 ALERTA GRAVE";
                adicionarAoHistorico("🔴 Central: Alerta Vermelho", horarioAlerta);

            } else if (novoEstado === 4) {
                bgBody.style.backgroundColor = "#5e2ca5";
                lblAlerta.innerText = "Central Roxo Severo (Cell Broadcast)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "🚨 ALERTA GRAVE";
                adicionarAoHistorico("🟣 GFS: Cell Broadcast Severo", horarioAlerta);

            } else if (novoEstado === 5) {
                bgBody.style.backgroundColor = "#4b0082";
                lblAlerta.innerText = "Central Roxo Extremo (Cell Broadcast)";
                lblMensagem.innerText = msgTexto;
                lblGrave.innerText = "🚨 ALERTA GRAVE";
                adicionarAoHistorico("🟣 GFS: Cell Broadcast Extremo", horarioAlerta);
            }
        

   <script>
async function buscarAlertasINMET() {
    let blocoAlertas = document.getElementById('alertas-comuns') || document.querySelector('.caixa-alertas');
    let blocoGraves = document.getElementById('alertas-graves') || document.querySelector('.caixa-graves');
    
    let estadoSigla = "PR"; 
    let cidadeUsuario = "Curitiba";

    // 1. DETECTA A LOCALIZAÇÃO VIA IP (Com timeout para nunca travar o site)
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2000);

        const respostaIp = await fetch('https://ipwho.is/', { signal: controller.signal });
        clearTimeout(timeoutId);

        if (respostaIp.ok) {
            const dadosIp = await respostaIp.json();
            if (dadosIp.success) {
                estadoSigla = (dadosIp.region_code || "PR").toUpperCase();
                cidadeUsuario = dadosIp.city || "Curitiba";
            }
        }
    } catch (e) { 
        console.log("Usando localização padrão (PR)"); 
    }

    // Atualiza o topo do seu painel imediatamente
    document.querySelectorAll('*').forEach(el => {
        if (el.textContent.includes('Localização:')) {
            el.innerHTML = `📍 Localização: ${cidadeUsuario} - ${estadoSigla}`;
        }
    });

    // 2. PUXA OS DADOS REAIS DO INMET USANDO O ENDPOINT RAW (SEM CACHE)
    try {
        const urlInmet = 'https://apiprevmet3.inmet.gov.br/aviso/ativo';
        // O truque do /raw + Math.random() faz o arquivo vir direto do INMET sem bloqueio de CORS ou cache velho
        const urlProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(urlInmet)}&cb=${Math.random()}`;
        
        const respostaInmet = await fetch(urlProxy);
        if (!respostaInmet.ok) throw new Error('Erro de resposta do servidor proxy');
        
        const dadosInmet = await respostaInmet.json();
        
        let comunsAtuais = ""; let comunsAntecipados = "";
        let gravesAtuais = ""; let gravesAntecipados = "";
        const agora = new Date();

        // Une todos os alertas do INMET em uma lista tratada única
        let listaAlertas = [];
        if (Array.isArray(dadosInmet)) {
            listaAlertas = dadosInmet;
        } else if (dadosInmet && typeof dadosInmet === 'object') {
            Object.keys(dadosInmet).forEach(chave => {
                const item = dadosInmet[chave];
                if (Array.isArray(item)) listaAlertas.push(...item);
                else listaAlertas.push(item);
            });
        }

        // 3. VARRE E FILTRA OS ALERTAS DO ESTADO DO USUÁRIO
        listaAlertas.forEach(aviso => {
            if (!aviso || !aviso.estados) return;

            const estadosAviso = String(aviso.estados).toUpperCase();
            if (estadosAviso.includes(estadoSigla)) {
                const severidade = aviso.severidade || ""; 
                const evento = aviso.evento || "Alerta Meteorológico";         
                const risks = aviso.riscos || "Atenção às condições climáticas locais.";
                const horaInicioTexto = aviso.inicio || "";

                // Estilização idêntica aos blocos do seu painel
                const formatoAlerta = `
                    <div style="margin-bottom: 14px; border-left: 4px solid #ffcc00; padding-left: 10px; margin-top: 10px; text-align: left;">
                        <strong style="color: #ffcc00;">⚠️ ${evento}</strong> (${severidade})<br>
                        <span style="font-size: 0.9em; color: #f0f0f0;">${risks}</span><br>
                        <small style="color: #bbb;">🕒 Validade: ${horaInicioTexto} até ${aviso.fim || ''}</small>
                    </div>
                `;
                
                let dataInicio = new Date();
                if (horaInicioTexto) {
                    dataInicio = new Date(horaInicioTexto.replace(/-/g, '/'));
                }

                const ehFuturo = dataInicio > agora;
                const severidadeLower = severidade.toLowerCase();
                const ehGrave = severidadeLower.includes('grande perigo') || 
                               (severidadeLower.includes('perigo') && !severidadeLower.includes('potencial'));

                if (ehGrave) {
                    if (ehFuturo) gravesAntecipados += formatoAlerta;
                    else gravesAtuais += formatoAlerta;
                } else {
                    if (ehFuturo) comunsAntecipados += formatoAlerta;
                    else comunsAtuais += formatoAlerta;
                }
            }
        });

        // 4. INJETA OS RESULTADOS NAS SUAS CAIXAS COM IDS
        if (blocoAlertas) {
            let htmlComum = "";
            if (comunsAtuais) htmlComum += `<div style="margin-bottom: 6px; color: #ffcc00; font-weight: bold;">⚡ ATIVOS AGORA:</div>${comunsAtuais}`;
            if (comunsAntecipados) htmlComum += `<div style="margin-top: 10px; margin-bottom: 6px; color: #00ccff; font-weight: bold;">📅 PRÓXIMOS DIAS:</div>${comunsAntecipados}`;
            blocoAlertas.innerHTML = htmlComum || `Nenhum alerta ativo para a região de ${cidadeUsuario} - ${estadoSigla}.`;
        }

        if (blocoGraves) {
            let htmlGrave = "";
            if (gravesAtuais) htmlGrave += `<div style="margin-bottom: 6px; color: #ff3333; font-weight: bold;">🚨 PERIGO ATIVO:</div>${gravesAtuais}`;
            if (gravesAntecipados) htmlGrave += `<div style="margin-top: 10px; margin-bottom: 6px; color: #ff9999; font-weight: bold;">📅 PERIGO AGENDADO:</div>${gravesAntecipados}`;
            blocoGraves.innerHTML = htmlGrave || "Nenhum alerta grave ativo.";
        }

    } catch (erro) {
        console.error('Erro na sincronização:', erro);
        if (blocoAlertas) {
            blocoAlertas.innerHTML = `<span style="color: #ffaa00; font-size: 0.9em;">Nenhum alerta ativo para a região de ${cidadeUsuario} - ${estadoSigla}.</span>`;
        }
    }
}
